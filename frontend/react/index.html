<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PantryGo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: "#F4F8F5",
                        sand: "#EAF1EC",
                        herb: "#93B1A6",
                        ocean: "#5C8374",
                        olive: "#183D3D",
